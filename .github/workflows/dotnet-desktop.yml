name: Build ChatTask

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore packages
        run: dotnet restore ChatTask/ChatTask.csproj

      - name: Build project
        run: dotnet build ChatTask/ChatTask.csproj --configuration Release --no-restore
